<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confidant</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8f6f0;
      --surface-color: #ffffff;
      --border-color: #e6e2da;
      --text-color: #2b2a29;
      --secondary-text: #73706c;
      --accent-color: #d4af37;
      --msg-assistant-bg: #f0ece3;
      --msg-user-bg: #d4af37;
      --msg-user-text: #2b2a29;
      --input-bg: #ffffff;
      --tag-bg: #f0ece3;
      --btn-secondary-bg: #ffffff;
      --btn-secondary-hover: #f8f6f0;

      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-serif: 'Lora', Georgia, serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1a1918;
        --surface-color: #242322;
        --border-color: #383634;
        --text-color: #e8e6e3;
        --secondary-text: #96928e;
        --accent-color: #e6c555;
        --msg-assistant-bg: #302e2d;
        --msg-user-bg: #e6c555;
        --msg-user-text: #1a1918;
        --input-bg: #242322;
        --tag-bg: #302e2d;
        --btn-secondary-bg: #242322;
        --btn-secondary-hover: #302e2d;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: var(--surface-color);
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.03);
    }

    header {
      padding: 20px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }

    header h1 {
      margin: 0;
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: var(--surface-color);
    }

    .tab {
      flex: 1;
      padding: 16px 0;
      text-align: center;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--secondary-text);
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
      user-select: none;
    }

    .tab:hover {
      color: var(--text-color);
    }

    .tab.active {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }

    .tab-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-content.active {
      display: flex;
    }

    /* Chat Tab */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 85%;
      line-height: 1.6;
      padding: 12px 18px;
      border-radius: 16px;
      animation: fadeIn 0.3s ease;
      word-wrap: break-word;
    }

    .message.assistant {
      align-self: flex-start;
      background-color: var(--msg-assistant-bg);
      color: var(--text-color);
      border-bottom-left-radius: 4px;
      font-family: var(--font-serif);
      font-size: 1.05rem;
    }

    .message.user {
      align-self: flex-end;
      background-color: var(--msg-user-bg);
      color: var(--msg-user-text);
      border-bottom-right-radius: 4px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
      background: var(--surface-color);
    }

    .chat-input {
      flex: 1;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 12px 20px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--text-color);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .chat-input:focus {
      border-color: var(--accent-color);
    }

    .chat-submit {
      background: var(--accent-color);
      color: var(--surface-color);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .chat-submit:hover:not(:disabled) {
      opacity: 0.9;
    }

    .chat-submit:active:not(:disabled) {
      transform: scale(0.95);
    }

    .chat-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-submit svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Output Tabs (Joke / Advice) */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .empty-state {
      font-family: var(--font-serif);
      color: var(--secondary-text);
      font-style: italic;
      text-align: center;
      margin-top: 60px;
      font-size: 1.1rem;
    }

    .output-box {
      width: 100%;
      max-width: 440px;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease;
    }

    .output-box.visible {
      display: flex;
    }

    .joke-setup {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      line-height: 1.5;
      margin-bottom: 16px;
      color: var(--text-color);
    }

    .joke-punchline {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent-color);
      line-height: 1.4;
    }

    .advice-headline {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 500;
      margin-bottom: 20px;
      color: var(--accent-color);
      line-height: 1.3;
    }

    .advice-body {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      line-height: 1.7;
      color: var(--text-color);
      text-align: left;
    }

    .tags {
      margin-top: 32px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      padding: 6px 12px;
      background: var(--tag-bg);
      color: var(--secondary-text);
      border-radius: 16px;
      letter-spacing: 0.02em;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: auto;
      padding-top: 40px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-color);
      color: var(--surface-color);
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--btn-secondary-hover);
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 14px 18px;
      background-color: var(--msg-assistant-bg);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      margin-bottom: 8px;
    }

    .typing-indicator.visible {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--secondary-text);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    .btn-secondary .loader {
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: var(--text-color);
    }

    @media (prefers-color-scheme: dark) {
      .btn-secondary .loader {
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--text-color);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="app-container">
    <header>
      <h1>Confidant</h1>
    </header>

    <div class="tabs">
      <div class="tab active" data-target="chat">Chat</div>
      <div class="tab" data-target="joke">Joke</div>
      <div class="tab" data-target="advice">Advice</div>
    </div>

    <!-- Chat Tab -->
    <div class="tab-content active" id="tab-chat">
      <div class="chat-window" id="chat-window">
        <!-- Messages will appear here -->
        <div class="typing-indicator" id="typing-indicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <form class="chat-input-area" id="chat-form">

        <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" class="chat-submit" id="chat-submit" disabled>
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </form>
    </div>

    <!-- Joke Tab -->
    <div class="tab-content" id="tab-joke">
      <div class="content-area">
        <div class="empty-state" id="joke-empty">Get a general joke below, or chat more for a personalized one!</div>

        <div class="output-box" id="joke-output">
          <div class="joke-setup" id="joke-setup"></div>
          <div class="joke-punchline" id="joke-punchline"></div>
          <div class="tags" id="joke-tags"></div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="btn-joke-normal" onclick="generateJoke(false)">
            <span class="btn-text">Tell me a joke</span>
            <div class="loader"></div>
          </button>
          <button class="btn btn-secondary" id="btn-joke-wild" onclick="generateJoke(true)">
            <span class="btn-text">Wild card</span>
            <div class="loader"></div>
          </button>
        </div>
      </div>
    </div>

    <!-- Advice Tab -->
    <div class="tab-content" id="tab-advice">
      <div class="content-area">
        <div class="empty-state" id="advice-empty">Get general advice below, or chat more for personalized advice!</div>

        <div class="output-box" id="advice-output">
          <div class="advice-headline" id="advice-headline"></div>
          <div class="advice-body" id="advice-body"></div>
          <div class="tags" id="advice-tags"></div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="btn-advice-normal" onclick="generateAdvice(false)">
            <span class="btn-text">Give me advice</span>
            <div class="loader"></div>
          </button>
          <button class="btn btn-secondary" id="btn-advice-surprise" onclick="generateAdvice(true)">
            <span class="btn-text">Surprise me</span>
            <div class="loader"></div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var API_KEY = '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';

    let history = [];
    let traits = [];

    const INITIAL_QUESTIONS = [
      "How's your day been so far?",
      "What's been on your mind lately?",
      "Hey, how are things going?",
      "What have you been up to today?",
      "How are you holding up this week?"
    ];

    // DOM Elements
    const tabs = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatSubmit = document.getElementById('chat-submit');
    const typingIndicator = document.getElementById('typing-indicator');

    // Tab Logic
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.target}`).classList.add('active');

        updateEmptyStates();
      });
    });

    function updateEmptyStates() {
      const hasTraits = traits.length > 0;
      const jokeOutputVisible = document.getElementById('joke-output').classList.contains('visible');
      const adviceOutputVisible = document.getElementById('advice-output').classList.contains('visible');

      document.getElementById('joke-empty').style.display = (hasTraits || jokeOutputVisible) ? 'none' : 'block';
      document.getElementById('advice-empty').style.display = (hasTraits || adviceOutputVisible) ? 'none' : 'block';
    }

    // Init
    function init() {
      if (history.length === 0) {
        const q = INITIAL_QUESTIONS[Math.floor(Math.random() * INITIAL_QUESTIONS.length)];
        addMessage('assistant', q);
        updateEmptyStates();
      }
    }

    function addMessage(role, text) {
      history.push({ role, content: text });

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.textContent = text;

      chatWindow.insertBefore(msgDiv, typingIndicator);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    chatInput.addEventListener('input', () => {
      chatSubmit.disabled = chatInput.value.trim().length === 0;
    });

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      chatInput.value = '';
      chatSubmit.disabled = true;
      addMessage('user', text);

      typingIndicator.classList.add('visible');
      scrollToBottom();

      try {
        const systemPrompt = `You are Aksel, a warm, observant, and supportive friend. You have your own life, hobbies, and quirky anecdotes (which you can make up) that you naturally weave into the conversation.
Chat naturally with the user like a real person. Share things about yourself rather than just asking questions. Never sound pushy, interviewing, or like you are profiling them. Be concise, casual, and empathetic.
After every reply, you MUST append a line starting exactly with "TRAITS: " followed by a JSON array of strings, containing up to 8 inferred facts about the user based on the entire conversation so far.
For example:
I'm so exhausted today, my cat kept waking me up! But anyway, that sounds like a tough day at work for you. Do you want to vent about it or distract yourself?
TRAITS: ["works long hours", "feeling stressed recently", "enjoys hiking"]

Only output your natural response, followed by the TRAITS line at the very end. Ensure the TRAITS array contains valid JSON.`;

        let apiMessages = history.map(m => ({ role: m.role, content: m.content }));
        if (apiMessages.length > 0 && apiMessages[0].role === 'assistant') {
          apiMessages.unshift({ role: 'user', content: 'Hi! Let\'s chat.' });
        }
        const replyText = await callAnthropic(systemPrompt, apiMessages, 500);

        const splitIndex = replyText.lastIndexOf('TRAITS:');
        let chatReply = replyText;

        if (splitIndex !== -1) {
          chatReply = replyText.substring(0, splitIndex).trim();
          const traitsJsonStr = replyText.substring(splitIndex + 7).trim();
          try {
            const parsedTraits = JSON.parse(traitsJsonStr);
            if (Array.isArray(parsedTraits)) {
              traits = parsedTraits;
            }
          } catch (err) {
            console.error("Failed to parse traits", traitsJsonStr, err);
          }
        }

        typingIndicator.classList.remove('visible');
        addMessage('assistant', chatReply);
        updateEmptyStates();

      } catch (err) {
        console.error(err);
        typingIndicator.classList.remove('visible');
        addMessage('assistant', `Sorry, I'm having a little trouble connecting right now. (${err.message})`);
      }
    });

    // Anthropic API Call
    async function callAnthropic(system, messages, maxTokens) {
      if (API_KEY === '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') {
        throw new Error("Please set your Anthropic API key in the script.");
      }

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: maxTokens,
          system: system,
          messages: messages
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API request failed');
      }

      const data = await response.json();
      return data.content[0].text;
    }

    function parseJsonOutput(str) {
      let cleaned = str.replace(/```json/g, '').replace(/```/g, '').trim();
      return JSON.parse(cleaned);
    }

    function toggleLoading(btnIds, isLoading) {
      btnIds.forEach(id => {
        const btn = document.getElementById(id);
        btn.disabled = isLoading;
        btn.querySelector('.btn-text').style.display = isLoading ? 'none' : 'inline';
        btn.querySelector('.loader').style.display = isLoading ? 'block' : 'none';
      });
    }

    // Generate Joke
    async function generateJoke(isWildcard) {
      toggleLoading(['btn-joke-normal', 'btn-joke-wild'], true);
      document.getElementById('joke-output').classList.remove('visible');

      try {
        let baseJokeStr = "";
        try {
          const ninjaRes = await fetch('https://api.api-ninjas.com/v1/jokes', {
            headers: { 'X-Api-Key': 'h2V9EqMPejxS02luc1VJDnnoobeUgqiIQwh3Bpy6' }
          });
          if (ninjaRes.ok) {
            const ninjaData = await ninjaRes.json();
            if (ninjaData && ninjaData.length > 0) {
              baseJokeStr = ninjaData[0].joke;
            }
          }
        } catch (e) {
          console.error("API Ninja error", e);
        }

        const system = `You are a Joke Agent. You write personalized jokes.
Your task is to write one joke.
We have fetched a base joke from an external API: "${baseJokeStr}".
If the user's traits are provided, adapt this base joke (or use its theme) to make it highly personalized to the user's traits. ${isWildcard ? 'WILD CARD MODE: Add unexpected, surreal, or bizarre elements to the joke. Go weird.' : 'Keep it light, clever, and relevant to the traits.'}
If no traits are known ("None known yet"), simply format the base joke (or provide a general one). In this case, you MUST explicitly tell them to chat more for the jokes to be personalized (e.g. by adding a punchline remark or a tag like "Chat more to personalize!").
Output MUST be ONLY a valid JSON object with the format: {"setup":"...","punchline":"...","tags":["tag1", "tag2"]}. Do not include markdown formatting.`;

        const prompt = `User traits: ${traits.length > 0 ? JSON.stringify(traits) : 'None known yet.'}\n\nGenerate the joke JSON now.`;
        const messages = [{ role: 'user', content: prompt }];

        const text = await callAnthropic(system, messages, 300);
        const data = parseJsonOutput(text);

        document.getElementById('joke-setup').textContent = data.setup;
        document.getElementById('joke-punchline').textContent = data.punchline;

        const tagsContainer = document.getElementById('joke-tags');
        tagsContainer.innerHTML = '';
        (data.tags || []).forEach(tag => {
          const el = document.createElement('span');
          el.className = 'tag';
          el.textContent = tag;
          tagsContainer.appendChild(el);
        });

        document.getElementById('joke-empty').style.display = 'none';
        document.getElementById('joke-output').classList.add('visible');

      } catch (err) {
        console.error(err);
        alert(err.message === "Please set your Anthropic API key in the script." ? err.message : 'Failed to generate joke. Check console.');
      } finally {
        toggleLoading(['btn-joke-normal', 'btn-joke-wild'], false);
      }
    }

    // Generate Advice
    async function generateAdvice(isSurprise) {
      toggleLoading(['btn-advice-normal', 'btn-advice-surprise'], true);
      document.getElementById('advice-output').classList.remove('visible');

      try {
        const system = `You are an Advice Agent. You write personalized advice.
Your task is to write one honest and specific piece of advice.
If the user's traits are provided, make the advice personalized based on their traits. ${isSurprise ? 'SURPRISE MODE: Push the advice in an unexpected, sideways direction (encouraging out-of-the-box or counterintuitive thinking). Be provocative but helpful.' : 'Keep it practical, warm, and genuine. Absolutely no clichés.'}
If no traits are known ("None known yet"), provide a piece of general advice. In this case, you MUST explicitly tell them (in the body or as a tag) to chat more for the advice to be personalized.
Output MUST be ONLY a valid JSON object with the format: {"headline":"...","body":"...","tags":["tag1", "tag2"]}. Do not include markdown formatting.`;

        const prompt = `User traits: ${traits.length > 0 ? JSON.stringify(traits) : 'None known yet.'}\n\nGenerate the advice JSON now.`;
        const messages = [{ role: 'user', content: prompt }];

        const text = await callAnthropic(system, messages, 400);
        const data = parseJsonOutput(text);

        document.getElementById('advice-headline').textContent = data.headline;
        document.getElementById('advice-body').textContent = data.body;

        const tagsContainer = document.getElementById('advice-tags');
        tagsContainer.innerHTML = '';
        (data.tags || []).forEach(tag => {
          const el = document.createElement('span');
          el.className = 'tag';
          el.textContent = tag;
          tagsContainer.appendChild(el);
        });

        document.getElementById('advice-empty').style.display = 'none';
        document.getElementById('advice-output').classList.add('visible');

      } catch (err) {
        console.error(err);
        alert(err.message === "Please set your Anthropic API key in the script." ? err.message : 'Failed to generate advice. Check console.');
      } finally {
        toggleLoading(['btn-advice-normal', 'btn-advice-surprise'], false);
      }
    }


    // Start
    init();

  </script>
</body>

</html>
